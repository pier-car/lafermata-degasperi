<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="La Fermata De Gasperi logo">
  <!-- Outer badge circle - sage green background -->
  <circle cx="100" cy="100" r="99" fill="#C5D9BB"/>

  <!-- Outer dark ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="#2B2B2B" stroke-width="5"/>

  <!-- Thin inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2B2B2B" stroke-width="1.5"/>

  <!-- White inner circle -->
  <circle cx="100" cy="100" r="85" fill="#FFFFFF"/>

  <!-- Pantograph arms -->
  <line x1="87" y1="34" x2="100" y2="22" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <line x1="113" y1="34" x2="100" y2="22" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="22" x2="128" y2="22" stroke="#AAAAAA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small top connector box -->
  <rect x="88" y="32" width="24" height="6" rx="1.5" fill="#CCCCBC"/>

  <!-- Top cap / roof connector -->
  <rect x="70" y="37" width="60" height="8" rx="2" fill="#C8CABB"/>

  <!-- "15" circle roundel -->
  <circle cx="100" cy="36" r="11" fill="#1E1E1E"/>
  <circle cx="100" cy="36" r="9" fill="#1E1E1E" stroke="#F2E8C8" stroke-width="1"/>
  <text x="100" y="40.5" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#F2E8C8" text-anchor="middle">15</text>

  <!-- "DE GASPERI" sign board -->
  <rect x="63" y="46" width="74" height="16" rx="2" fill="#3A3018"/>
  <text x="100" y="58" font-family="Arial Narrow,Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#E8C84A" text-anchor="middle" letter-spacing="1.5">DE GASPERI</text>

  <!-- Tram upper body outer frame (cream/off-white) -->
  <rect x="60" y="62" width="80" height="46" rx="3" fill="#DDDCCC"/>

  <!-- Window frame recess (slightly darker) -->
  <rect x="62" y="64" width="76" height="36" rx="2" fill="#C8C7B8"/>

  <!-- Left window -->
  <rect x="64" y="66" width="34" height="30" rx="2" fill="#E8EFF5"/>
  <!-- Left window bar -->
  <line x1="81" y1="66" x2="81" y2="96" stroke="#B8B8A8" stroke-width="1"/>

  <!-- Right window -->
  <rect x="102" y="66" width="34" height="30" rx="2" fill="#E8EFF5"/>
  <!-- Right window bar -->
  <line x1="119" y1="66" x2="119" y2="96" stroke="#B8B8A8" stroke-width="1"/>

  <!-- Centre pillar between windows -->
  <rect x="98" y="64" width="4" height="36" fill="#C8C7B8"/>

  <!-- Small upper trim line -->
  <line x1="60" y1="104" x2="140" y2="104" stroke="#B0AF9F" stroke-width="1.5"/>

  <!-- Green lower cab edge / transition -->
  <rect x="60" y="107" width="80" height="4" rx="1" fill="#2E6B3E"/>

  <!-- Lower tram body (forest green) -->
  <rect x="60" y="110" width="80" height="46" rx="2" fill="#2A6A3C"/>

  <!-- Green body horizontal detail lines -->
  <line x1="60" y1="122" x2="140" y2="122" stroke="#1F5530" stroke-width="1.2"/>
  <line x1="60" y1="148" x2="140" y2="148" stroke="#1F5530" stroke-width="1.2"/>

  <!-- Vertical panel dividers on green body -->
  <line x1="90" y1="110" x2="90" y2="156" stroke="#1F5530" stroke-width="0.8" opacity="0.6"/>
  <line x1="110" y1="110" x2="110" y2="156" stroke="#1F5530" stroke-width="0.8" opacity="0.6"/>

  <!-- "2019" text in gold on green body -->
  <text x="100" y="140" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#E8C84A" text-anchor="middle" letter-spacing="3">2019</text>

  <!-- Circular headlight / ornament on green body -->
  <circle cx="100" cy="152" r="6.5" fill="#2A6A3C" stroke="#C0BC90" stroke-width="1.5"/>
  <circle cx="100" cy="152" r="3.5" fill="#D8D0A0"/>

  <!-- Side handle / lever (left) -->
  <rect x="54" y="125" width="7" height="14" rx="3" fill="#AAAAAA" stroke="#888" stroke-width="0.8"/>
  <circle cx="57.5" cy="132" r="4.5" fill="#C0C0C0" stroke="#888" stroke-width="0.8"/>

  <!-- Gray bumper / apron at bottom -->
  <rect x="63" y="156" width="74" height="10" rx="3" fill="#9EA8A0"/>

  <!-- Rail/track under tram -->
  <rect x="68" y="166" width="64" height="3" rx="1.5" fill="#888C88"/>
</svg>
