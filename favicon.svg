<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer badge circle -->
  <circle cx="32" cy="32" r="31" fill="#C5D9BB"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#2B2B2B" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="26" fill="#FFFFFF"/>
  <!-- Tram car body upper (cream) -->
  <rect x="14" y="22" width="36" height="16" rx="2" fill="#DDDCCC"/>
  <!-- Tram front windows -->
  <rect x="16" y="24" width="14" height="11" rx="1.5" fill="#BFD6E8"/>
  <rect x="34" y="24" width="14" height="11" rx="1.5" fill="#BFD6E8"/>
  <!-- Tram car body lower (forest green) -->
  <rect x="14" y="37" width="36" height="14" rx="1" fill="#2A6A3C"/>
  <!-- "2019" text in gold -->
  <text x="32" y="47" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#E8C84A" text-anchor="middle" letter-spacing="1">2019</text>
  <!-- "DE GASPERI" sign -->
  <rect x="17" y="16" width="30" height="7" rx="1.5" fill="#2C2010"/>
  <text x="32" y="21.5" font-family="sans-serif" font-size="4.5" font-weight="bold" fill="#E8C84A" text-anchor="middle" letter-spacing="0.5">DE GASPERI</text>
  <!-- "15" circle -->
  <circle cx="32" cy="11" r="6" fill="#1E1E1E"/>
  <text x="32" y="14.5" font-family="sans-serif" font-size="6" font-weight="bold" fill="#F5EDD4" text-anchor="middle">15</text>
  <!-- Pantograph -->
  <line x1="26" y1="16" x2="32" y2="7" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="16" x2="32" y2="7" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="7" x2="42" y2="7" stroke="#AAA" stroke-width="2" stroke-linecap="round"/>
  <!-- Gray bumper -->
  <rect x="16" y="51" width="32" height="5" rx="2" fill="#9EA8A0"/>
</svg>
